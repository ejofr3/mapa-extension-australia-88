<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Remote &amp; Very Remote Australia – WHV 462 Eligible Postcodes</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; }
    #map { width: 100vw; height: 100vh; }

    #loading {
      position: fixed; inset: 0;
      background: rgba(15, 23, 42, 0.88);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 3000; color: #fff;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid rgba(255,255,255,0.25);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p { font-size: 15px; }
    #loading small { margin-top: 6px; font-size: 12px; opacity: 0.65; }

    #title {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.96);
      padding: 10px 18px; border-radius: 10px;
      z-index: 1000; text-align: center;
      box-shadow: 0 3px 14px rgba(0,0,0,0.22);
      max-width: 92vw;
      pointer-events: none;
    }
    #title h2 { font-size: 15px; color: #0f172a; }
    #title p  { font-size: 11px; color: #475569; margin-top: 3px; }

    #legend {
      position: fixed; bottom: 18px; right: 14px;
      background: rgba(255,255,255,0.96);
      padding: 12px 16px; border-radius: 10px;
      z-index: 1000; min-width: 200px;
      box-shadow: 0 3px 14px rgba(0,0,0,0.22);
    }
    #legend h4 { font-size: 12px; color: #0f172a; text-transform: uppercase; letter-spacing: .5px;
                 margin-bottom: 9px; padding-bottom: 6px; border-bottom: 1px solid #e2e8f0; }
    .leg { display: flex; align-items: center; margin-bottom: 6px; font-size: 12px; color: #334155; }
    .dot { width: 13px; height: 13px; border-radius: 50%; margin-right: 9px; flex-shrink: 0; }

    #stats {
      position: fixed; bottom: 18px; left: 14px;
      background: rgba(255,255,255,0.96);
      padding: 10px 14px; border-radius: 10px;
      z-index: 1000; font-size: 12px; color: #334155;
      box-shadow: 0 3px 14px rgba(0,0,0,0.22);
    }
    #stats strong { color: #0f172a; font-size: 22px; display: block; }
    #err { display:none; color:#dc2626; font-size:14px; text-align:center; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="loading">
  <div class="spinner"></div>
  <p>Loading postcode data…</p>
  <small>Fetching Australian postcode coordinates</small>
  <div id="err"></div>
</div>

<div id="title">
  <h2>Remote &amp; Very Remote Australia</h2>
  <p>Eligible postcodes for second/third Work &amp; Holiday Visa (subclass 462) — Tourism &amp; Hospitality from 22 Jun 2021</p>
</div>

<div id="legend">
  <h4>State / Territory</h4>
</div>

<div id="stats">
  <strong id="stat-n">–</strong>
  postcodes plotted
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ── palette ─────────────────────────────────────────── */
const COLORS = {
  NSW: '#3b82f6',
  NT:  '#f97316',
  QLD: '#22c55e',
  VIC: '#ef4444',
  SA:  '#14b8a6',
  TAS: '#eab308',
  WA:  '#a855f7'
};
const LABELS = {
  NSW: 'New South Wales',
  NT:  'Northern Territory (all)',
  QLD: 'Queensland',
  VIC: 'Victoria',
  SA:  'South Australia',
  TAS: 'Tasmania',
  WA:  'Western Australia'
};

/* ── helpers ──────────────────────────────────────────── */
function rng(a, b) {
  const r = [];
  for (let i = a; i <= b; i++) r.push(i);
  return r;
}

/* ── eligible postcode sets ───────────────────────────── */
const ELIGIBLE = {
  NSW: new Set([
    2356, 2386, 2387, 2396, 2405, 2406, 2672, 2675, 2825, 2826, 2829,
    ...rng(2832, 2836), ...rng(2838, 2840),
    2873, 2878, 2879, 2898, 2899
  ]),
  NT: 'all',
  QLD: new Set([
    4025, 4183,
    ...rng(4417,4420), 4422, 4423, ...rng(4426,4428),
    4454, 4461, 4462, 4465, 4467, 4468, 4470, 4474, 4475,
    ...rng(4477,4482), ...rng(4486,4494), 4496, 4497,
    4680, 4694, 4695, 4697,
    ...rng(4699,4707), ...rng(4709,4714), 4717,
    ...rng(4720,4728), ...rng(4730,4733), ...rng(4735,4746),
    4750, 4751, 4753, 4754, 4756, 4757,
    ...rng(4798,4812), ...rng(4814,4825), ...rng(4828,4830),
    4849, 4850, 4852,
    ...rng(4854,4856), ...rng(4858,4861),
    4865, ...rng(4868,4888), ...rng(4890,4892), 4895
  ]),
  VIC: new Set([
    3424, 3506, 3509, 3512, ...rng(3889,3892)
  ]),
  SA: new Set([
    ...rng(5220,5223), ...rng(5302,5304),
    5440, 5576, 5577, 5582, 5583,
    ...rng(5602,5607), 5611,
    ...rng(5630,5633), ...rng(5640,5642), ...rng(5650,5655),
    5660, 5661, 5670, 5671, 5680, 5690,
    5713, 5715, 5717, 5719, 5720,
    ...rng(5722,5725), ...rng(5730,5734)
  ]),
  TAS: new Set([
    7139, ...rng(7255,7257), ...rng(7466,7470)
  ]),
  WA: new Set([
    6161,
    ...rng(6335,6338), 6341, 6343, 6346, 6348,
    ...rng(6350,6353), ...rng(6355,6359),
    6361, 6363, 6365, ...rng(6367,6369),
    6373, 6375, 6385, 6386,
    ...rng(6418,6429), 6431, 6434, ...rng(6436,6438),
    6440, 6443, ...rng(6445,6448), 6450, 6452,
    ...rng(6466,6468), 6470, 6472, 6473,
    ...rng(6475,6477), 6479, 6480, 6484,
    ...rng(6487,6490), 6515, ...rng(6517,6519), 6536,
    6605, 6606, 6608, 6609, ...rng(6612,6614),
    6616, 6620, 6623, 6625, 6627, 6628,
    ...rng(6630,6632), 6635, ...rng(6638,6640),
    6731, 6733, 6798, 6799
  ])
};

function isEligible(postcode, state) {
  const set = ELIGIBLE[state];
  if (!set) return false;
  if (set === 'all') return true;
  return set.has(+postcode);
}

/* ── map init ─────────────────────────────────────────── */
const map = L.map('map', { preferCanvas: true }).setView([-25.5, 134], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  maxZoom: 18
}).addTo(map);

/* ── legend ───────────────────────────────────────────── */
const legendEl = document.getElementById('legend');
Object.entries(COLORS).forEach(([state, color]) => {
  const div = document.createElement('div');
  div.className = 'leg';
  div.innerHTML = `<div class="dot" style="background:${color};border:1.5px solid ${color}cc"></div><span>${LABELS[state]}</span>`;
  legendEl.appendChild(div);
});

/* ── load & plot ──────────────────────────────────────── */
const DATA_URL =
  'https://raw.githubusercontent.com/matthewproctor/australianpostcodes/master/australian_postcodes.json';

fetch(DATA_URL)
  .then(r => {
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  })
  .then(data => {
    const seen = new Set();
    let count = 0;

    data.forEach(item => {
      const state = (item.state || '').trim().toUpperCase();
      const pc    = String(item.postcode || '').trim();
      const lat   = parseFloat(item.lat);
      const lng   = parseFloat(item.long);

      if (!isEligible(pc, state)) return;
      if (isNaN(lat) || isNaN(lng) || (lat === 0 && lng === 0)) return;
      if (seen.has(pc)) return;
      seen.add(pc);

      const color = COLORS[state] || '#94a3b8';

      L.circleMarker([lat, lng], {
        radius: 7,
        color: color,
        weight: 1.5,
        fillColor: color,
        fillOpacity: 0.55
      })
        .addTo(map)
        .bindPopup(
          `<b style="font-size:14px">${pc}</b><br>` +
          `${item.locality || ''}<br>` +
          `<span style="color:${color};font-weight:600">${state}</span>`
        );

      count++;
    });

    document.getElementById('loading').style.display = 'none';
    document.getElementById('stat-n').textContent = count;
  })
  .catch(err => {
    const errEl = document.getElementById('err');
    errEl.style.display = 'block';
    errEl.textContent = `Failed to load data: ${err.message}. Check internet connection and reload.`;
    document.querySelector('#loading .spinner').style.display = 'none';
    document.querySelector('#loading p').style.display = 'none';
    document.querySelector('#loading small').style.display = 'none';
    console.error(err);
  });
</script>
</body>
</html>
